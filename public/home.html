<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #6a5acd, #4361ee);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    width: 100%;
    max-width: 420px;
    border-radius: 12px;
    padding: 40px 32px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
  }
  h1 { margin: 0 0 8px; font-size: 26px; color: #222; }
  p.sub { margin: 0 0 28px; color: #777; font-size: 15px; }
  button {
    padding: 12px 24px; background: #4361ee; color: #fff; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  button:hover { background: #3651d4; }
</style>
</head>
<body>

<div class="card">
  <h1 id="welcomeMsg">Loading...</h1>
  <p class="sub">This is your home page.</p>
  <button id="logoutBtn">Log Out</button>
</div>

<script>
  const token = localStorage.getItem('authToken');

  if (!token) {
    window.location.href = 'login.html';
  } else {
    fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(async res => {
        if (!res.ok) throw new Error('invalid session');
        return res.json();
      })
      .then(data => {
        document.getElementById('welcomeMsg').textContent = 'Welcome, ' + data.username + '!';
      })
      .catch(() => {
        localStorage.removeItem('authToken');
        window.location.href = 'login.html';
      });
  }

  document.getElementById('logoutBtn').addEventListener('click', function () {
    localStorage.removeItem('authToken');
    window.location.href = 'login.html';
  });
</script>

</body>
</html>
