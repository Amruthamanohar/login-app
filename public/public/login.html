<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #6a5acd, #4361ee);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    width: 100%;
    max-width: 380px;
    border-radius: 12px;
    padding: 32px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  h1 { margin: 0 0 4px; font-size: 24px; color: #222; text-align: center; }
  p.sub { margin: 0 0 24px; text-align: center; color: #777; font-size: 14px; }
  label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #444; }
  input[type="email"], input[type="password"] {
    width: 100%; padding: 10px 12px; margin-bottom: 16px;
    border: 1px solid #d5d5e0; border-radius: 8px; font-size: 14px; outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #4361ee; }
  button {
    width: 100%; padding: 12px; background: #4361ee; color: #fff; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  button:hover:not(:disabled) { background: #3651d4; }
  .error { color: #d33; font-size: 13px; margin: -10px 0 14px; display: none; }
  .footer-link { text-align: center; margin-top: 18px; font-size: 13px; color: #666; }
  .footer-link a { color: #4361ee; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>

<div class="card">
  <h1>Welcome Back</h1>
  <p class="sub">Log in with your email and password</p>

  <form id="loginForm" novalidate>
    <label for="email">Email ID</label>
    <input type="email" id="email" placeholder="you@example.com" required>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password" required>

    <div class="error" id="errorMsg"></div>

    <button type="submit" id="submitBtn">Log In</button>
  </form>

  <div class="footer-link">
    Don't have an account? <a href="signup.html">Sign up</a>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    errorMsg.style.display = 'none';

    if (!email || !password) {
      errorMsg.textContent = 'Please enter both email and password.';
      errorMsg.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Logging in...';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errorMsg.textContent = data.error || 'Something went wrong. Please try again.';
        errorMsg.style.display = 'block';
        return;
      }

      localStorage.setItem('authToken', data.token);
      window.location.href = 'home.html';
    } catch (err) {
      errorMsg.textContent = 'Could not reach the server. Please try again.';
      errorMsg.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Log In';
    }
  });
</script>

</body>
</html>
